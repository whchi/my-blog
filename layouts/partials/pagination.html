{{ if or .HasPrev .HasNext }}
<div class="delimiter"></div>
<nav class="pagination" role="navigation">
  {{ if .HasPrev }}
  <a class="btn btn-primary btn-older-posts" aria-label="prev page" href="{{ .Prev.URL }}">
    <div><span aria-hidden="true">&larr;</span></div>
  </a>
  {{ else }}
  <a class="btn btn-primary btn-older-posts disabled" aria-label="no more page" href="#">
    <div>
      <span aria-hidden="true">&#10006;</span>
    </div>
  </a>
  {{ end }}
  <div>
    <span>{{ i18n "pageOf" . }}</span>
  </div>
  {{ if .HasNext }}
  <a class="btn btn-primary btn-newer-posts" aria-label="next page" href="{{ .Next.URL }}">
    <div>{{ i18n "olderPage" }} <span aria-hidden="true">&rarr;</span></div>
  </a>
  {{ else }}
  <a class="btn btn-primary btn-newer-posts disabled" aria-label="no more page" href="#">
    <div><span aria-hidden="true">&#10006;</span></div>
  </a>
  {{ end }}
</nav>
{{ end }}
