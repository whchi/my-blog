{{ partial "header.html" . }}
<section class="taxonomy-terms">
  <h1>{{ .Title }}</h1>
  {{ $data := .Data }}
  <div class="tag-wrapper">
    {{ range $name, $taxonomy := .Site.Taxonomies.tags }}
      <a class="tag-container" href="/tags/{{ $name | urlize }}">
        {{ $name | humanize }}<span class="tag-count"
          >&#40;{{ $taxonomy.Count }}&#41;</span
        ></a
      >
    {{ end }}
  </div>
</section>

{{ partial "footer.html" . }}
