{{ partial "header.html" . }}
<section class="taxonomy-terms">
    <h1>{{ .Title }}</h1>
    {{ $data := .Data }}
    <div class="container">
        {{ range $key, $value := .Data.Pages }}
        <a class="tag-container" href="{{ $value.URL }}">
            {{ $value.Name }}
        </a>
        {{ end }}
    </div>
</section>
{{ partial "footer.html" . }}
