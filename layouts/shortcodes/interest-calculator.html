<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- CSS Reset & Base --- */
        :root {
            --bg-base: #fafaf9;
            --bg-elevated: #ffffff;
            --text-primary: #18181b;
            --text-secondary: #71717a;
            --text-tertiary: #a1a1aa;
            --border: #e4e4e7;
            --border-subtle: #f4f4f5;
            --accent: #059669;
            --accent-light: #d1fae5;
            --accent-dark: #047857;
            --warning: #d97706;
            --danger: #dc2626;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            
            /* Tinted shadows for warmth */
            --shadow-sm: 0 1px 2px 0 rgb(9 9 11 / 0.04);
            --shadow-md: 0 4px 6px -1px rgb(9 9 11 / 0.05), 0 2px 4px -2px rgb(9 9 11 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(9 9 11 / 0.06), 0 4px 6px -4px rgb(9 9 11 / 0.05);
            --shadow-accent: 0 4px 14px 0 rgb(5 150 105 / 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            color: var(--text-primary);
            background-color: transparent;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- Layout --- */
        .widget-container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--bg-elevated);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .widget-header {
            padding: 28px 32px;
            background: var(--bg-base);
            border-bottom: 1px solid var(--border-subtle);
        }

        .widget-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .badge {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-base);
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            margin-left: auto;
        }

        /* --- Main Layout Grid --- */
        .widget-body {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
        }

        @media (min-width: 900px) {
            .widget-body {
                grid-template-columns: 340px 1fr;
            }
        }

        /* --- Controls Panel --- */
        .controls {
            padding: 28px 32px;
            background: var(--bg-base);
            border-right: 1px solid var(--border-subtle);
        }

        @media (max-width: 899px) {
            .controls {
                border-right: none;
                border-bottom: 1px solid var(--border-subtle);
            }
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .input-label span:first-child {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .label-hint {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0 14px;
            height: 44px;
            transition: all 0.2s ease;
        }

        .input-wrapper:hover {
            border-color: var(--text-tertiary);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .input-prefix, .input-suffix {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
            user-select: none;
        }

        .input-field {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0 8px;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-variant-numeric: tabular-nums;
            outline: none;
            min-width: 0;
        }

        .input-field::placeholder {
            color: var(--text-tertiary);
        }

        .input-field::-webkit-inner-spin-button,
        .input-field::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Range Slider */
        .range-slider {
            width: 100%;
            height: 4px;
            margin-top: 10px;
            background: var(--border);
            border-radius: 2px;
            appearance: none;
            cursor: pointer;
            outline: none;
        }

        .range-slider::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid var(--bg-elevated);
            box-shadow: var(--shadow-sm);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .range-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-accent);
        }

        .range-slider::-webkit-slider-thumb:active {
            transform: scale(0.95);
        }

        .range-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid var(--bg-elevated);
            box-shadow: var(--shadow-sm);
        }

        /* --- Results Panel --- */
        .results {
            padding: 28px 32px;
            background: var(--bg-elevated);
        }

        /* Summary Cards - Asymmetric Grid */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        @media (max-width: 600px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-base);
            border-radius: var(--radius-md);
            padding: 20px;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Hero Card - spans full width */
        .card.hero {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
        }

        .card.hero:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-accent);
        }

        .card.hero .card-title {
            color: rgba(255, 255, 255, 0.8);
        }

        .card.hero .card-value {
            color: white;
            font-size: 1.75rem;
        }

        .card.hero .card-sub {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Profit Card */
        .card.profit {
            background: var(--accent-light);
            border: 1px solid #a7f3d0;
        }

        .card.profit .card-title {
            color: var(--accent-dark);
        }

        .card.profit .card-value {
            color: var(--accent-dark);
        }

        /* Standard Cards */
        .card.slate .card-title {
            color: var(--text-secondary);
        }

        .card.accent .card-title {
            color: var(--warning);
        }

        .card.accent .card-value {
            color: var(--warning);
        }

        .card.accent .card-sub {
            color: #b45309;
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.01em;
        }

        .card-sub {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin-top: 4px;
            line-height: 1.4;
        }

        .highlight-text {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Freedom Card Status Colors */
        #card-freedom {
            transition: all 0.3s ease;
        }

        /* --- Chart Container --- */
        .chart-section {
            margin-top: 8px;
        }

        .chart-wrapper-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: block;
        }

        .chart-container {
            position: relative;
            height: 280px;
            background: var(--bg-base);
            border-radius: var(--radius-md);
            padding: 16px;
            border: 1px solid var(--border-subtle);
        }

        .footer-text {
            text-align: center;
            font-size: 0.8125rem;
            color: var(--text-tertiary);
            margin-top: 20px;
            text-wrap: balance;
        }

        /* --- Animation --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .card:nth-child(1) { animation-delay: 0ms; }
        .card:nth-child(2) { animation-delay: 50ms; }
        .card:nth-child(3) { animation-delay: 100ms; }
        .card:nth-child(4) { animation-delay: 150ms; }
        .card:nth-child(5) { animation-delay: 200ms; }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="widget-header">
            <h2>
                <div class="header-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <title>計算機圖示</title>
                        <rect width="16" height="20" x="4" y="2" rx="2"/>
                        <line x1="8" x2="16" y1="6" y2="6"/>
                        <line x1="16" x2="16" y1="14" y2="18"/>
                        <path d="M16 10h.01"/><path d="M12 10h.01"/>
                        <path d="M8 10h.01"/><path d="M12 14h.01"/>
                        <path d="M8 14h.01"/><path d="M12 18h.01"/>
                        <path d="M8 18h.01"/>
                    </svg>
                </div>
                複利計算機
            </h2>
            <span class="badge">把時間當朋友</span>
        </div>

        <div class="widget-body">
            <!-- Controls Side -->
            <div class="controls">
                <!-- Principal -->
                <div class="input-group">
                    <div class="input-label">
                        <span>初始本金</span>
                    </div>
                    <div class="input-wrapper">
                        <span class="input-prefix">$</span>
                        <input type="number" id="input-principal" class="input-field" value="100000" min="0" step="10000">
                    </div>
                    <input type="range" id="range-principal" class="range-slider" min="0" max="5000000" step="10000" value="100000">
                </div>

                <!-- Monthly Contribution -->
                <div class="input-group">
                    <div class="input-label">
                        <span>每月投入</span>
                    </div>
                    <div class="input-wrapper">
                        <span class="input-prefix">$</span>
                        <input type="number" id="input-monthly" class="input-field" value="5000" min="0" step="1000">
                    </div>
                    <input type="range" id="range-monthly" class="range-slider" min="0" max="200000" step="1000" value="5000">
                </div>

                <!-- Monthly Expense -->
                <div class="input-group">
                    <div class="input-label">
                        <span>目標每月開銷</span>
                        <span class="label-hint">現值</span>
                    </div>
                    <div class="input-wrapper">
                        <span class="input-prefix">$</span>
                        <input type="number" id="input-expense" class="input-field" value="30000" min="0" step="1000">
                    </div>
                    <input type="range" id="range-expense" class="range-slider" min="0" max="200000" step="1000" value="30000">
                </div>

                <!-- Interest Rate -->
                <div class="input-group">
                    <div class="input-label">
                        <span>年報酬率</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="number" id="input-rate" class="input-field" value="6" min="0" max="20" step="0.1">
                        <span class="input-suffix">%</span>
                    </div>
                    <input type="range" id="range-rate" class="range-slider" min="0" max="20" step="0.5" value="6">
                </div>

                <!-- Inflation Rate -->
                <div class="input-group">
                    <div class="input-label">
                        <span>預期通膨</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="number" id="input-inflation" class="input-field" value="2" min="0" max="10" step="0.1">
                        <span class="input-suffix">%</span>
                    </div>
                    <input type="range" id="range-inflation" class="range-slider" min="0" max="10" step="0.5" value="2">
                </div>

                <!-- Years -->
                <div class="input-group">
                    <div class="input-label">
                        <span>投資年限</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="number" id="input-years" class="input-field" value="10" min="1" max="50" step="1">
                        <span class="input-suffix">年</span>
                    </div>
                    <input type="range" id="range-years" class="range-slider" min="1" max="50" step="1" value="10">
                </div>
            </div>

            <!-- Results Side -->
            <div class="results">
                <!-- Summary Grid -->
                <div class="summary-grid">
                    <!-- Card 1: Total Balance (Hero) -->
                    <div class="card hero">
                        <div class="card-title">期末總資產</div>
                        <div class="card-value" id="val-balance">$0</div>
                        <div class="card-sub">讓複利為您工作</div>
                    </div>

                    <!-- Card 2: Total Profit -->
                    <div class="card profit">
                        <div class="card-title">總獲利</div>
                        <div class="card-value" id="val-profit">$0</div>
                        <div class="card-sub" id="val-roi">報酬率 0%</div>
                    </div>

                    <!-- Card 3: Total Invested -->
                    <div class="card slate">
                        <div class="card-title">總投入成本</div>
                        <div class="card-value" id="val-invested-card">$0</div>
                        <div class="card-sub">本金 + 累計月存</div>
                    </div>

                    <!-- Card 4: Passive Income -->
                    <div class="card" id="card-freedom">
                        <div class="card-title">每月被動收入</div>
                        <div class="card-value" id="val-passive">$0</div>
                        <div class="card-sub" id="val-freedom-status">達成率 0%</div>
                    </div>

                    <!-- Card 5: Real Purchasing Power -->
                    <div class="card accent">
                        <div class="card-title">實質購買力</div>
                        <div class="card-value" id="val-real">$0</div>
                        <div class="card-sub">扣除通膨後價值</div>
                    </div>
                </div>

                <div class="chart-section">
                    <span class="chart-wrapper-title">資產成長趨勢</span>
                    <div class="chart-container">
                        <canvas id="compoundChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Logic & State ---
        const state = {
            principal: 100000,
            monthly: 5000,
            expense: 30000,
            rate: 6.0,
            inflation: 2.0,
            years: 10
        };

        let chartInstance = null;

        // Helper: Format Currency
        const formatCurrency = (num) => {
            return new Intl.NumberFormat('zh-TW', {
                style: 'currency',
                currency: 'TWD',
                maximumFractionDigits: 0
            }).format(num);
        };

        // --- Core Calculation ---
        function calculate() {
            const { principal, monthly, rate, inflation, years } = state;

            let currentBalance = principal;
            let totalInvested = principal;
            const yearlyData = [];

            yearlyData.push({
                year: 0,
                balance: principal,
                realBalance: principal,
                invested: principal
            });

            for (let year = 1; year <= years; year++) {
                for (let m = 0; m < 12; m++) {
                    currentBalance = currentBalance * (1 + (rate / 100) / 12);
                    currentBalance += monthly;
                    totalInvested += monthly;
                }

                const realBalance = currentBalance / Math.pow(1 + inflation / 100, year);

                yearlyData.push({
                    year: year,
                    balance: currentBalance,
                    realBalance: realBalance,
                    invested: totalInvested
                });
            }

            return yearlyData;
        }

        // --- Update UI ---
        function updateUI() {
            const data = calculate();
            const final = data[data.length - 1];
            const profit = final.balance - final.invested;
            const roi = final.invested > 0 ? (profit / final.invested) * 100 : 0;

            // 1. Total Balance
            document.getElementById('val-balance').textContent = formatCurrency(final.balance);

            // 2. Total Profit
            const profitEl = document.getElementById('val-profit');
            profitEl.textContent = (profit >= 0 ? '+' : '') + formatCurrency(profit);
            document.getElementById('val-roi').textContent = `總報酬率 ${roi.toFixed(1)}%`;

            // 3. Total Invested
            document.getElementById('val-invested-card').textContent = formatCurrency(final.invested);

            // 4. Real Purchasing Power
            document.getElementById('val-real').textContent = formatCurrency(final.realBalance);

            // 5. Passive Income Analysis
            const nominalMonthlyPassive = (final.balance * (state.rate / 100)) / 12;
            const realMonthlyPassive = nominalMonthlyPassive / Math.pow(1 + state.inflation / 100, state.years);

            document.getElementById('val-passive').textContent = formatCurrency(realMonthlyPassive);

            const coverageRatio = (realMonthlyPassive / state.expense) * 100;
            const freedomCard = document.getElementById('card-freedom');
            const freedomStatus = document.getElementById('val-freedom-status');

            freedomStatus.innerHTML = `可覆蓋開銷 <span class="highlight-text">${coverageRatio.toFixed(1)}%</span>`;

            // Update Freedom Card Color
            if (coverageRatio >= 100) {
                freedomCard.style.background = '#dcfce7';
                freedomCard.style.border = '1px solid #86efac';
            } else if (coverageRatio >= 50) {
                freedomCard.style.background = '#fef3c7';
                freedomCard.style.border = '1px solid #fcd34d';
            } else {
                freedomCard.style.background = '#fee2e2';
                freedomCard.style.border = '1px solid #fca5a5';
            }

            updateChart(data);
        }

        // --- Chart Logic ---
        function updateChart(data) {
            const ctx = document.getElementById('compoundChart').getContext('2d');
            const labels = data.map(d => `第${d.year}年`);

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '名目總資產',
                            data: data.map(d => d.balance),
                            borderColor: '#059669',
                            backgroundColor: 'rgba(5, 150, 105, 0.08)',
                            borderWidth: 2.5,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: '#059669'
                        },
                        {
                            label: '總投入成本',
                            data: data.map(d => d.invested),
                            borderColor: '#71717a',
                            borderWidth: 2,
                            borderDash: [4, 4],
                            fill: false,
                            pointRadius: 0,
                            pointHoverRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: { 
                            display: true, 
                            position: 'top',
                            align: 'end',
                            labels: { 
                                boxWidth: 12, 
                                usePointStyle: true,
                                padding: 16,
                                font: { 
                                    size: 12,
                                    family: "'Inter', sans-serif"
                                } 
                            } 
                        },
                        tooltip: {
                            backgroundColor: 'rgba(24, 24, 27, 0.95)',
                            titleFont: { size: 13, family: "'Inter', sans-serif" },
                            bodyFont: { size: 12, family: "'Inter', sans-serif" },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    label += new Intl.NumberFormat('zh-TW', { 
                                        style: 'currency', 
                                        currency: 'TWD', 
                                        maximumFractionDigits: 0 
                                    }).format(context.parsed.y);
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { 
                            grid: { display: false },
                            ticks: { 
                                maxTicksLimit: 6, 
                                font: { size: 11, family: "'Inter', sans-serif" },
                                color: '#71717a'
                            }
                        },
                        y: {
                            grid: { 
                                color: '#f4f4f5',
                                drawBorder: false
                            },
                            ticks: { 
                                callback: v => v >= 10000 ? (v/10000).toFixed(0) + '萬' : v,
                                font: { size: 11, family: "'Inter', sans-serif" },
                                color: '#71717a',
                                padding: 8
                            },
                            border: { display: false }
                        }
                    }
                }
            });
        }

        // --- Event Listeners Sync ---
        function setupSync(inputId, rangeId, key) {
            const input = document.getElementById(inputId);
            const range = document.getElementById(rangeId);

            input.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value) || 0;
                state[key] = val;
                range.value = val;
                updateUI();
            });

            range.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                state[key] = val;
                input.value = val;
                updateUI();
            });
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            setupSync('input-principal', 'range-principal', 'principal');
            setupSync('input-monthly', 'range-monthly', 'monthly');
            setupSync('input-expense', 'range-expense', 'expense');
            setupSync('input-rate', 'range-rate', 'rate');
            setupSync('input-inflation', 'range-inflation', 'inflation');
            setupSync('input-years', 'range-years', 'years');

            updateUI();
        });
    </script>
