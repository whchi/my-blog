{{ $src := .Get "src" }} {{ $title := .Get "title" }}{{ $caption := .Get
"caption" }}

<figure class="center">
  <img src="{{$src}}" title="{{$title}}" decoding="async" />
  <figcaption>{{$caption}}</figcaption>
</figure>
<style lang="css">
  figure.center {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    margin-bottom: 1rem;
  }
  figure.center > img {
    max-width: 100%;
    height: auto;
  }
</style>
