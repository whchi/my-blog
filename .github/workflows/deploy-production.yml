name: deploy-production

# Controls when the action will run. Triggers the workflow on push
# events but only for the main/master branch
on:
  push:
    branches: [ master ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "deploy-production"
  deploy-production:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      deployments: write

     # Steps represent a sequence of tasks that will be executed as part of the job
    steps:

    # Checks-out your repository under $GITHUB_WORKSPACE with submodules
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Initiate deployment status
    - name: Start Deployment
      uses: bobheadxi/deployments@v0.4.3
      id: deployment
      with:
        step: start
        token: ${{ secrets.GITHUB_TOKEN }}
        env: Production

    # Install latest Hugo extended from official release
    - name: Install Hugo
      run: |
        set -euo pipefail
        HUGO_VERSION=0.159.1
        curl -fsSL -o /tmp/hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
        sudo dpkg -i /tmp/hugo.deb
        hugo version

    # Builds the site using Hugo
    - name: Build
      run: hugo --gc --minify -d .cloudflare-pages

     # Push our generated Hugo site to Cloudflare Pages
    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      id: cloudflare-deploy
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy .cloudflare-pages --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}

    # Update deployment status
    - name: Update Deployment Status
      uses: bobheadxi/deployments@v0.4.3
      if: always()
      with:
        step: finish
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ job.status }}
        deployment_id: ${{ steps.deployment.outputs.deployment_id }}
        env_url: ${{ steps.cloudflare-deploy.outputs.deployment-url }}
