baseURL = 'https://d6i.dev/'
pygmentsCodeFences = true
theme = 'hamburg'
### hamburger settings ###
defaultContentLanguage = 'zh'
defaultContentLanguageInSubdir = 'false'
disableLanguages = ['en']
pagination.PagerSize = 10
image = '/images/the-road-not-taken.webp'
[permalinks]
posts = "/:year/:month/:filename"

[params]
# Short subtitle/tagline. This is displayed in the header.
# themecolor = '#ffff00' # Defines the tab color in Chrome for Android.
# To load additional CSS styles
customCSS = ['custom-hamburg.css']
mainSections = ['posts']
# Show this very user-friendly and absolutely not annoying GDPR notice at the bottom of the page
ShowGDPRNotice = true
disqus = false
disqusShortname = 'whcdc'
github = 'whchi'
medium = 'whccchi'
linkedin = 'wei-han-chi-615006110'

[mediaTypes]

[mediaTypes."application/javascript"]
suffixes = "js"

[languages]

[languages.en]
copyright = '&copy; whchi 2018'
languageCode = 'en'
languageName = 'English'
title = 'murmurs and records'

[languages.en.menu]

[[languages.en.menu.main]]
identifier = 'about'
name = 'about'
url = 'about'

[languages.zh]
copyright = '&copy; whchi 2018'
languageCode = 'zh-tw'
languageName = '繁體中文'
title = '社畜人生'

[languages.zh.menu]

[[languages.zh.menu.main]]
identifier = 'about'
name = 'about'
url = 'about'

[[languages.zh.menu.main]]
identifier = 'tags'
name = 'tags'
url = 'tags'

[[languages.zh.menu.main]]
identifier = 'archives'
name = 'archives'
url = 'archives'

[[languages.zh.menu.main]]
identifier = 'tools'
name = 'tools'
url = 'tools'

[outputs]
home = ["HTML", "RSS", "JSON"]

[sitemap]
  changeFreq = ''
  disable = false
  filename = 'sitemap.xml'
  priority = -1
